name: CI

on:
  push:
    branches: [main, master]
  pull_request:

concurrency:
  group: ci-{{ "${{" }} github.workflow {{ "}}" }}-{{ "${{" }} github.ref {{ "}}" }}
  cancel-in-progress: true

jobs:
  checks:
    name: Checks
    runs-on: ubuntu-latest
    timeout-minutes: 20

{%- if cookiecutter.use_testing == "y" %}
    services:
      postgres:
        image: postgres:{{cookiecutter.postgres_version}}
        env:
          POSTGRES_DB: {{cookiecutter.project_slug}}
          POSTGRES_USER: {{cookiecutter.postgres_user}}
          POSTGRES_PASSWORD: {{cookiecutter.postgres_password}}
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U {{cookiecutter.postgres_user}} -d {{cookiecutter.project_slug}}"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
{%- endif %}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements/base.txt
            requirements/local.txt
            requirements_dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements_dev.txt

{%- if cookiecutter.use_code_style == "y" %}
      - name: Ruff check
        run: ruff check .

      - name: Ruff format
        run: ruff format --check .
{%- else %}
      - name: flake8
        run: flake8 .
{%- endif %}

      - name: Mypy
        env:
{%- if cookiecutter.use_testing == "y" %}
          DJANGO_SETTINGS_MODULE: config.django.test
          DATABASE_URL: psql://{{cookiecutter.postgres_user}}:{{cookiecutter.postgres_password}}@127.0.0.1:5432/{{cookiecutter.project_slug}}
{%- else %}
          DJANGO_SETTINGS_MODULE: config.django.local
          DATABASE_URL: sqlite:///ci.sqlite3
{%- endif %}
          SECRET_KEY: ci-secret-key-not-for-production
        run: mypy {{cookiecutter.project_slug}}

      - name: Django system check
        env:
{%- if cookiecutter.use_testing == "y" %}
          DJANGO_SETTINGS_MODULE: config.django.test
          DATABASE_URL: psql://{{cookiecutter.postgres_user}}:{{cookiecutter.postgres_password}}@127.0.0.1:5432/{{cookiecutter.project_slug}}
{%- else %}
          DJANGO_SETTINGS_MODULE: config.django.local
          DATABASE_URL: sqlite:///ci.sqlite3
{%- endif %}
          SECRET_KEY: ci-secret-key-not-for-production
        run: python manage.py check
{%- if cookiecutter.use_testing == "y" %}

      - name: Pytest
        env:
          DJANGO_SETTINGS_MODULE: config.django.test
          DATABASE_URL: psql://{{cookiecutter.postgres_user}}:{{cookiecutter.postgres_password}}@127.0.0.1:5432/{{cookiecutter.project_slug}}
          SECRET_KEY: ci-secret-key-not-for-production
        run: pytest -q
{%- endif %}
