# GitLab CI — generated by Django Style Guide cookiecutter
{%- if cookiecutter.use_testing == "y" %}
# Tests use Postgres via the postgres service and config.django.test.
{%- else %}
# System check uses config.django.local with an in-job SQLite database.
{%- endif %}

stages:
  - check

default:
  image: python:3.12-slim
  before_script:
    - python -m pip install --upgrade pip
    - pip install -r requirements_dev.txt
  cache:
    key: "${CI_COMMIT_REF_SLUG}"
    paths:
      - .cache/pip
  variables:
    PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"
{%- if cookiecutter.use_testing == "y" %}
    DJANGO_SETTINGS_MODULE: config.django.test
    DATABASE_URL: "psql://{{cookiecutter.postgres_user}}:{{cookiecutter.postgres_password}}@postgres:5432/{{cookiecutter.project_slug}}"
{%- else %}
    DJANGO_SETTINGS_MODULE: config.django.local
    DATABASE_URL: "sqlite:///ci.sqlite3"
{%- endif %}
    SECRET_KEY: ci-secret-key-not-for-production

{% if cookiecutter.use_code_style == "y" -%}
ruff:
  stage: check
  script:
    - ruff check .
    - ruff format --check .
{% else -%}
flake8:
  stage: check
  script:
    - flake8 .
{% endif %}

mypy:
  stage: check
  script:
    - mypy {{cookiecutter.project_slug}}
{%- if cookiecutter.use_testing == "y" %}
  services:
    - name: postgres:{{cookiecutter.postgres_version}}
      alias: postgres
  variables:
    POSTGRES_DB: {{cookiecutter.project_slug}}
    POSTGRES_USER: {{cookiecutter.postgres_user}}
    POSTGRES_PASSWORD: {{cookiecutter.postgres_password}}
{%- endif %}

django-check:
  stage: check
  script:
    - python manage.py check
{%- if cookiecutter.use_testing == "y" %}
  services:
    - name: postgres:{{cookiecutter.postgres_version}}
      alias: postgres
  variables:
    POSTGRES_DB: {{cookiecutter.project_slug}}
    POSTGRES_USER: {{cookiecutter.postgres_user}}
    POSTGRES_PASSWORD: {{cookiecutter.postgres_password}}

pytest:
  stage: check
  script:
    - pytest -q
  services:
    - name: postgres:{{cookiecutter.postgres_version}}
      alias: postgres
  variables:
    POSTGRES_DB: {{cookiecutter.project_slug}}
    POSTGRES_USER: {{cookiecutter.postgres_user}}
    POSTGRES_PASSWORD: {{cookiecutter.postgres_password}}
{%- endif %}
